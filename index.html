<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Arcade</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d0d1a;
    color: #fff;
    font-family: monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 40px;
  }
  h1 {
    font-size: 36px;
    letter-spacing: 8px;
    color: #00e8ff;
    text-shadow: 0 0 20px #00e8ff;
  }
  .games {
    display: flex;
    gap: 32px;
    flex-wrap: wrap;
    justify-content: center;
  }
  a {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    padding: 32px 40px;
    border: 2px solid #333;
    border-radius: 4px;
    text-decoration: none;
    color: #fff;
    transition: border-color 0.2s, box-shadow 0.2s;
    background: #12121f;
  }
  a:hover {
    border-color: #00e8ff;
    box-shadow: 0 0 20px rgba(0,232,255,0.2);
  }
  .icon { font-size: 52px; }
  .title { font-size: 20px; letter-spacing: 4px; color: #00e8ff; }
  .desc { font-size: 12px; color: #888; letter-spacing: 1px; }
</style>
</head>
<body>
  <h1>ARCADE</h1>
  <div class="games">
    <a href="shooter.html">
      <div class="icon">🎯</div>
      <div class="title">TOP-DOWN SHOOTER</div>
      <div class="desc">ARROW KEYS + MOUSE AIM</div>
    </a>
    <a href="tictactoe.html">
      <div class="icon">⭕</div>
      <div class="title">TIC-TAC-TOE</div>
      <div class="desc">TWO PLAYER</div>
    </a>
  </div>
</body>
</html>
