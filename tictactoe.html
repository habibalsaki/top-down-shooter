<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1.5rem;
      letter-spacing: 3px;
      color: #e0e0ff;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      height: 1.5rem;
      color: #a0c4ff;
      font-weight: 600;
      letter-spacing: 1px;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 10px;
    }

    .cell {
      width: 110px;
      height: 110px;
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
      border: 2px solid #0f3460;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x {
      color: #ff6b6b;
    }

    .cell.o {
      color: #4ecdc4;
    }

    .cell.win {
      background: #0f3460;
      border-color: #a0c4ff;
      animation: pulse 0.5s ease;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    #scores {
      display: flex;
      gap: 2rem;
      margin-top: 2rem;
      font-size: 1rem;
      color: #a0c4ff;
    }

    .score-box {
      text-align: center;
    }

    .score-box span {
      display: block;
      font-size: 1.8rem;
      font-weight: bold;
      color: #e0e0ff;
    }

    #restart {
      margin-top: 1.8rem;
      padding: 0.7rem 2rem;
      font-size: 1rem;
      background: #0f3460;
      color: #e0e0ff;
      border: 2px solid #a0c4ff;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.15s, transform 0.1s;
    }

    #restart:hover {
      background: #1a4a8a;
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <h1>TIC TAC TOE</h1>
  <div id="status">X's turn</div>
  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>
  <div id="scores">
    <div class="score-box">X <span id="score-x">0</span></div>
    <div class="score-box">Draws <span id="score-d">0</span></div>
    <div class="score-box">O <span id="score-o">0</span></div>
  </div>
  <button id="restart">New Game</button>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board = Array(9).fill(null);
    let current = 'X';
    let gameOver = false;
    const scores = { X: 0, O: 0, D: 0 };

    const cells = document.querySelectorAll('.cell');
    const status = document.getElementById('status');
    const scoreX = document.getElementById('score-x');
    const scoreO = document.getElementById('score-o');
    const scoreD = document.getElementById('score-d');

    cells.forEach(cell => cell.addEventListener('click', () => {
      const i = +cell.dataset.i;
      if (gameOver || board[i]) return;

      board[i] = current;
      cell.textContent = current;
      cell.classList.add('taken', current.toLowerCase());

      const winLine = getWinner();
      if (winLine) {
        winLine.forEach(idx => cells[idx].classList.add('win'));
        status.textContent = `${current} wins!`;
        scores[current]++;
        updateScores();
        gameOver = true;
      } else if (board.every(Boolean)) {
        status.textContent = "It's a draw!";
        scores.D++;
        updateScores();
        gameOver = true;
      } else {
        current = current === 'X' ? 'O' : 'X';
        status.textContent = `${current}'s turn`;
      }
    }));

    function getWinner() {
      for (const line of WINS) {
        const [a, b, c] = line;
        if (board[a] && board[a] === board[b] && board[a] === board[c]) return line;
      }
      return null;
    }

    function updateScores() {
      scoreX.textContent = scores.X;
      scoreO.textContent = scores.O;
      scoreD.textContent = scores.D;
    }

    document.getElementById('restart').addEventListener('click', () => {
      board = Array(9).fill(null);
      current = 'X';
      gameOver = false;
      status.textContent = "X's turn";
      cells.forEach(cell => {
        cell.textContent = '';
        cell.className = 'cell';
      });
    });
  </script>
</body>
</html>
